services:
  backend:
    build:
      context: ./backend
    container_name: doc-qa-backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Doc QA Backend
      APP_VERSION: 0.1.0
      API_PREFIX: /api/v1
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      VECTOR_STORE: ${VECTOR_STORE:-faiss}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  frontend:
    build:
      context: ./frontend
    container_name: doc-qa-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
